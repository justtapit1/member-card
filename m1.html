<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 0% 0%, #c3cfe2 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, #f5f7fa 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #d6e4ff 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #e2ebf0 0%, transparent 50%);
            background-attachment: fixed;
            padding: 20px 0 100px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            width: 85%;
            max-width: 360px;
            min-height: 480px;
            padding: 50px 25px;
            border-radius: 45px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            text-align: center;
            display: none; 
            flex-direction: column;
            justify-content: center;
        }

        .logo-container {
            width: 1.2in; 
            height: 1.2in;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin: 0 auto 15px auto;
            overflow: hidden;
            background: #fff;
        }

        .logo { width: 100%; height: 100%; object-fit: cover; }

        .info-section h1 { margin: 15px 0 5px 0; font-size: 28px; color: #111; font-weight: 700; }
        .info-section h3 { margin: 0; font-weight: 500; color: #3b82f6; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0 20px 0;
            padding: 0 20px;
        }

        .icon-btn {
            height: 65px;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 26px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .icon-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .call { background: #eef2f7; color: #2d3436; }
        .whatsapp { background: #e7f9ed; color: #25D366; }
        .insta { background: #feeaf1; color: #E1306C; }
        .fb { background: #e0f2fe; color: #1877F2; }

        .floating-save {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 18px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        #loader { color: #555; font-weight: 600; text-align: center; }

        /* NAYA POPUP INPUT FIELD STYLE */
        .lead-input {
            width: 90%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #e5e7eb; 
            border-radius: 8px; 
            font-size: 14px; 
            outline: none; 
            background: #f9fafb;
            font-family: 'Segoe UI', sans-serif;
        }
        .lead-input:focus {
            border-color: #25D366;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <div id="loader">Loading Digital Card...</div>

    <div id="leadModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; backdrop-filter: blur(5px);">
        <div style="background:#ffffff; width:85%; max-width:360px; margin:35% auto; padding:30px 20px; border-radius:24px; text-align:center; box-shadow: 0px 10px 30px rgba(0,0,0,0.3); font-family: 'Segoe UI', Arial, sans-serif;">
            
            <div style="width: 50px; height: 50px; background: #e7f9ed; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            
            <h3 style="margin:0 0 10px 0; color:#111827; font-size:20px; font-weight:600;">Connect with Us</h3>
            <p style="color:#6b7280; font-size:13px; margin:0 0 20px 0; line-height:1.4;">Please enter your details to view the smart business card.</p>
            
            <input type="text" id="custName" placeholder="Your Name" required class="lead-input">
            <br>
            <input type="tel" id="custPhone" placeholder="Mobile Number" required class="lead-input">
            <br>
            
            <button onclick="submitLead()" style="width:97%; padding:13px; background:#25D366; color:#ffffff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s;">Submit & View Card</button>
        </div>
    </div>

    <div class="card" id="mainCard">
        <div class="info-section">
            <div class="logo-container">
                <img id="display-logo" src="" alt="Logo" class="logo">
            </div>
            <h1 id="display-name">...</h1>
            <h3 id="display-shop">...</h3>
        </div>

        <div class="icon-grid">
            <a id="btn-call" href="#" class="icon-btn call"><i class="fas fa-phone"></i></a>
            <a id="btn-wa" href="#" class="icon-btn whatsapp"><i class="fab fa-whatsapp"></i></a>
            <a id="btn-insta" href="#" class="icon-btn insta"><i class="fab fa-instagram"></i></a>
            <a id="btn-fb" href="#" class="icon-btn fb"><i class="fab fa-facebook"></i></a>
        </div>
        
        <p style="font-size: 10px; color: #bbb; letter-spacing: 2px; margin-top: 10px;">JUST TAP IT</p>
    </div>

    <a href="#" onclick="downloadVCard()" class="floating-save">
        <i class="fas fa-user-plus"></i> SAVE CONTACT
    </a>

    <script>
        // AAPKA WEB APP API URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzJoyKhinHjRXsluhywU0cc7hLKeakpE0DgM0U2gWVcE6Tw1bf61nU-5wPOnTRyCveg/exec";
        let currentUser = {};

        async function loadData() {
            try {
                const params = new URLSearchParams(window.location.search);
                const searchId = params.get('id');

                console.log("Searching for ID:", searchId); // Debugging

                if (!searchId) {
                    document.getElementById('loader').innerText = "Invalid Card ID! Please check link.";
                    return;
                }

                // =========================================================================
                // STEP 1: SECURE SUBSCRIPTION / LEAD FORM STATUS CHECK
                // =========================================================================
                const statusResponse = await fetch(`${API_URL}?id=${searchId}`);
                const statusData = await statusResponse.json();

                if (statusData.lead_status === "ON") {
                    // Agar Status ON hai toh Card load hone se pehle Popup Modal show karo
                    document.getElementById('leadModal').style.display = 'block';
                }

                // =========================================================================
                // STEP 2: LOAD BUSINESS CARD DETAILS (Aapka Purana Flow)
                // =========================================================================
                const response = await fetch(API_URL);
                const data = await response.json();
                
                console.log("Data from Sheet:", data); // Debugging

                // Match karne ka pakka tarika (String aur Trim use karke)
                currentUser = data.find(user => {
                    return String(user.MAMBER_ID).trim() === String(searchId).trim();
                });

                if (currentUser) {
                    document.getElementById('display-name').innerText = currentUser.NAME || "N/A";
                    document.getElementById('display-shop').innerText = currentUser.SHOP_NAME || "N/A";
                    document.getElementById('display-logo').src = currentUser.image_url || "https://via.placeholder.com/150";
                    
                    document.getElementById('btn-call').href = "tel:" + currentUser.MOB_NO;
                    document.getElementById('btn-wa').href = "https://wa.me/" + (currentUser.whatsapp_no || currentUser.MOB_NO);
                    document.getElementById('btn-insta').href = currentUser.INSTA_ID || "#";
                    document.getElementById('btn-fb').href = currentUser.FB_ID || "#";

                    document.getElementById('loader').style.display = "none";
                    document.getElementById('mainCard').style.display = "flex";
                } else {
                    document.getElementById('loader').innerHTML = `Card Not Found!<br><small>ID: ${searchId} is not in Excel.</small>`;
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('loader').innerText = "Error Loading Data. Check Internet or Script Access.";
            }
        }

        // =========================================================================
        // STEP 3: LEAD SUBMISSION HANDLING
        // =========================================================================
        function submitLead() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (name === "" || phone === "") {
                alert("Please fill in all details.");
                return;
            }
            if (phone.length < 10) {
                alert("Please enter a valid 10-digit mobile number.");
                return;
            }

            // Secure POST Request to save lead in Google Apps Script
            fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "name": name, "phone": phone, "card_id": cardId })
            })
            .then(() => {
                // Successful hone par Modal hide kar do
                document.getElementById('leadModal').style.display = 'none';
            })
            .catch(error => {
                alert("Something went wrong. Please try again.");
                console.error('Error:', error);
            });
        }

        function downloadVCard() {
            if(!currentUser.NAME) return;
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${currentUser.NAME}\nORG:${currentUser.SHOP_NAME}\nTEL;TYPE=CELL:${currentUser.MOB_NO}\nEMAIL:${currentUser.EMAIL_ID || ""}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = currentUser.NAME + ".vcf";
            a.href = url;
            a.click();
        }

        loadData();
    </script>
</body>
</html>
