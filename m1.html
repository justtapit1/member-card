<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 0% 0%, #c3cfe2 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, #f5f7fa 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #d6e4ff 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #e2ebf0 0%, transparent 50%);
            background-attachment: fixed;
            padding: 20px 0 100px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            width: 85%;
            max-width: 360px;
            min-height: 480px; /* QR hatne ke baad height adjust ki hai */
            padding: 50px 25px;
            border-radius: 45px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            text-align: center;
            display: none; 
            flex-direction: column;
            justify-content: center;
        }

        .logo-container {
            width: 1.2in; 
            height: 1.2in;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin: 0 auto 15px auto;
            overflow: hidden;
            background: #fff;
        }

        .logo { width: 100%; height: 100%; object-fit: cover; }

        .info-section h1 { margin: 15px 0 5px 0; font-size: 28px; color: #111; font-weight: 700; }
        .info-section h3 { margin: 0; font-weight: 500; color: #3b82f6; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0 20px 0;
            padding: 0 20px;
        }

        .icon-btn {
            height: 65px;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 26px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .icon-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .call { background: #eef2f7; color: #2d3436; }
        .whatsapp { background: #e7f9ed; color: #25D366; }
        .insta { background: #feeaf1; color: #E1306C; }
        .fb { background: #e0f2fe; color: #1877F2; }

        .floating-save {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 18px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .floating-save:active { transform: translateX(-50%) scale(0.95); }

        #loader { color: #555; font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader">Loading Digital Card...</div>

    <div class="card" id="mainCard">
        <div class="info-section">
            <div class="logo-container">
                <img id="display-logo" src="" alt="Logo" class="logo">
            </div>
            <h1 id="display-name">...</h1>
            <h3 id="display-shop">...</h3>
        </div>

        <div class="icon-grid">
            <a id="btn-call" href="#" class="icon-btn call"><i class="fas fa-phone"></i></a>
            <a id="btn-wa" href="#" class="icon-btn whatsapp"><i class="fab fa-whatsapp"></i></a>
            <a id="btn-insta" href="#" class="icon-btn insta"><i class="fab fa-instagram"></i></a>
            <a id="btn-fb" href="#" class="icon-btn fb"><i class="fab fa-facebook"></i></a>
        </div>
        
        <p style="font-size: 10px; color: #bbb; letter-spacing: 2px; margin-top: 10px;">JUST TAP IT</p>
    </div>

    <a href="#" onclick="downloadVCard()" class="floating-save">
        <i class="fas fa-user-plus"></i> SAVE CONTACT
    </a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbynoNmIyQT-h9QQv1dYhXzwxu2udZprSewwtcrh9kIwyEq4llfEnAno33h0NHnDARvF/exec";
        let currentUser = {};

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const params = new URLSearchParams(window.location.search);
                const searchId = params.get('id');

                currentUser = data.find(user => String(user.MAMBER_ID).trim() === String(searchId).trim());

                if (currentUser && currentUser.NAME) {
                    document.getElementById('display-name').innerText = currentUser.NAME;
                    document.getElementById('display-shop').innerText = currentUser.SHOP_NAME;
                    document.getElementById('display-logo').src = currentUser.image_url || "https://via.placeholder.com/150";
                    
                    document.getElementById('btn-call').href = "tel:" + currentUser.MOB_NO;
                    document.getElementById('btn-wa').href = "https://wa.me/" + (currentUser.whatsapp_no || currentUser.MOB_NO);
                    document.getElementById('btn-insta').href = currentUser.INSTA_ID || "#";
                    document.getElementById('btn-fb').href = currentUser.FB_ID || "#";

                    document.getElementById('loader').style.display = "none";
                    document.getElementById('mainCard').style.display = "flex";
                } else {
                    document.getElementById('loader').innerText = "Card Not Found!";
                }
            } catch (err) {
                document.getElementById('loader').innerText = "Error Loading Data";
            }
        }

        function downloadVCard() {
            if(!currentUser.NAME) return;
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${currentUser.NAME}\nORG:${currentUser.SHOP_NAME}\nTEL;TYPE=CELL:${currentUser.MOB_NO}\nEMAIL:${currentUser.EMAIL_ID}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = currentUser.NAME + ".vcf";
            a.href = url;
            a.click();
        }

        loadData();
    </script>
</body>
</html>
